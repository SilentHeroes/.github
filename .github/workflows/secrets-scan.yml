name: Secret Scanning (Org Required)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout scan script from .github repo
        uses: actions/checkout@v4
        with:
          repository: SilentHeroes/.github
          path: .org-github
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Get changed files (PR only)
        if: github.event_name == 'pull_request'
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMRT ${{ github.event.pull_request.base.sha }} ${{ github.sha }})
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Scan for secrets
        id: scan
        env:
          SCAN_MODE: ${{ github.event_name == 'pull_request' && 'pr' || 'push' }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          chmod +x .org-github/.github/scripts/scan-secrets.sh
          .org-github/.github/scripts/scan-secrets.sh

      - name: Notify Google Chat on failure
        if: failure() && steps.scan.outcome == 'failure'
        env:
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
        run: |
          if [ -z "$GOOGLE_CHAT_WEBHOOK" ]; then
            echo "::warning::GOOGLE_CHAT_WEBHOOK secret not configured. Skipping notification."
            exit 0
          fi

          FINDINGS_SUMMARY=$(cat /tmp/secrets-scan-findings.txt 2>/dev/null || echo "See workflow run for details.")

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            LINK="${{ github.event.pull_request.html_url }}"
            CONTEXT="PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          else
            LINK="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
            CONTEXT="Push to main (${{ github.sha }})"
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          TRUNCATED=$(echo "$FINDINGS_SUMMARY" | head -c 2500)
          if [ ${#FINDINGS_SUMMARY} -gt 2500 ]; then
            TRUNCATED="${TRUNCATED}... (truncated, see workflow run)"
          fi

          PAYLOAD=$(jq -n \
            --arg context "$CONTEXT" \
            --arg link "$LINK" \
            --arg run_url "$RUN_URL" \
            --arg findings "$TRUNCATED" \
            '{text: ("<users/all> *SECRET SCANNING ALERT*\n\n" + $context + "\n" + $link + "\n\n*Findings:*\n```\n" + $findings + "\n```\n\nWorkflow run: " + $run_url)}')

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$GOOGLE_CHAT_WEBHOOK"
